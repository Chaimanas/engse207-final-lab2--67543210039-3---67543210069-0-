<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>👤 Profile — Final Lab Set 2</title>
  <!-- copy CSS จาก index.html -->
<style>
  /* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Background */
body {
  background: #f5f6fa;
  color: #333;
  padding: 20px;
}

/* Container */
.container {
  max-width: 800px;
  margin: auto;
}

/* Card */
.card {
  background: #fff;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* Title */
h1, h2 {
  margin-bottom: 15px;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Buttons */
button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #4CAF50;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #45a049;
}

/* Danger button */
button.danger {
  background: #e74c3c;
}

button.danger:hover {
  background: #c0392b;
}

/* Task list */
.task {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.task:last-child {
  border-bottom: none;
}

/* Completed */
.completed {
  text-decoration: line-through;
  color: gray;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.navbar a {
  text-decoration: none;
  color: #4CAF50;
  font-weight: bold;
}

.navbar a:hover {
  text-decoration: underline;
}
</style>

</head>
<body>
<script src="config.js"></script>
<script>
const USER = window.APP_CONFIG.USER_URL;
const token = localStorage.getItem('jwt_token');

async function loadProfile() {
  const res  = await fetch(`${USER}/api/users/me`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await res.json();
  // แสดงข้อมูล profile ใน form
  document.getElementById('display_name').value = data.profile.display_name || '';
  document.getElementById('bio').value           = data.profile.bio || '';
}

async function updateProfile() {
  const display_name = document.getElementById('display_name').value;
  const bio          = document.getElementById('bio').value;
  const res = await fetch(`${USER}/api/users/me`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ display_name, bio })
  });
  const data = await res.json();
  if (res.ok) alert('อัปเดต Profile สำเร็จ!');
}

loadProfile();
</script>
</body>
</html>
